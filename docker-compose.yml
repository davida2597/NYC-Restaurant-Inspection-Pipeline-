# ---------------------------------------------------------------------------
# docker-compose.yml
# ---------------------------------------------------------------------------
# Orchestrates three services:
#
#   db         — PostgreSQL 15 (starts empty, ETL populates it)
#   etl        — runs etl.py to fetch, clean, and load data
#   streamlit  — launches the dashboard after ETL finishes
#
# Usage:
#   docker-compose up --build          # first run (builds images + fetches data)
#   docker-compose up                  # subsequent runs (skips rebuild)
#   docker-compose down -v             # stop and delete containers + volume
#
# After the ETL container finishes, open http://localhost:8501 in your browser.
# ---------------------------------------------------------------------------

services:

  # --------------------------------------------------------------------------
  # db — PostgreSQL database (starts with an empty schema)
  # --------------------------------------------------------------------------
  db:
    image: postgres:15

    environment:
      POSTGRES_DB:       nyc_inspections   # database name
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres          # change this in production!

    ports:
      # Expose 5432 on the host so you can connect with psql or pgAdmin
      - "5432:5432"

    # Health check: the etl service waits until this passes before starting.
    # pg_isready exits 0 only when PostgreSQL is fully accepting connections.
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout:  5s
      retries:  10

    volumes:
      # Named volume keeps data across docker-compose down (but not down -v)
      - pgdata:/var/lib/postgresql/data


  # --------------------------------------------------------------------------
  # etl — fetch → clean → load pipeline
  # --------------------------------------------------------------------------
  etl:
    build: .                          # build from the Dockerfile in this folder
    command: python etl.py

    depends_on:
      db:
        condition: service_healthy    # don't start until PostgreSQL is ready

    env_file: .env                    # load your API token and other settings

    environment:
      # Override DATABASE_URL to point at the 'db' service container.
      # 'db' resolves to the db container's IP inside the Docker network.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nyc_inspections

      # How many days of data to fetch on first run.
      # 90 days ≈ 2–5 min fetch time.  Increase for a richer dataset.
      ETL_FETCH_DAYS: 90


  # --------------------------------------------------------------------------
  # streamlit — interactive dashboard
  # --------------------------------------------------------------------------
  streamlit:
    build: .
    command: >
      streamlit run streamlit_app.py
        --server.port    8501
        --server.address 0.0.0.0
        --server.headless true

    depends_on:
      etl:
        # Wait for the ETL container to exit successfully before launching.
        # Requires Docker Compose v2 (ships with Docker Desktop ≥ 4.x).
        condition: service_completed_successfully

    ports:
      - "8501:8501"                   # access at http://localhost:8501

    env_file: .env

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nyc_inspections


# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  pgdata:
    # Named volume — persists data between docker-compose up/down cycles.
    # To wipe the database and start fresh: docker-compose down -v
